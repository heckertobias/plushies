services:
  app:
    image: ghcr.io/heckertobias/plushies:latest
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - plushies_db:/data
      - plushies_uploads:/uploads
    environment:
      - DATABASE_URL=file:/data/plushies.db
      - UPLOADS_DIR=/uploads
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - ICAL_TOKEN=${ICAL_TOKEN}
    restart: unless-stopped

volumes:
  plushies_db:
  plushies_uploads:
